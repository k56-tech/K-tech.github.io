<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ALLXPOLON</title>

<style>
body {
    margin: 0;
    padding: 0;
    background: black;
    overflow: hidden;
    font-family: Arial, sans-serif;
    color: red;
    text-align: center;
}

/* Matrix canvas */
canvas {
    position: fixed;
    top: 0;
    left: 0;
    z-index: -1;
}

/* Neon + glitch */
.title {
    font-size: 60px;
    margin-top: 80px;
    letter-spacing: 10px;
    animation: glitch 1s infinite;
}

@keyframes glitch {
    0% { text-shadow: 2px 2px red; }
    50% { text-shadow: -2px -2px red; }
    100% { text-shadow: 2px -2px red; }
}

.subtitle {
    font-size: 18px;
    letter-spacing: 5px;
}

/* Buton */
.btn {
    margin-top: 40px;
    padding: 15px 40px;
    border: 2px solid red;
    display: inline-block;
    cursor: pointer;
    transition: 0.3s;
}

.btn:hover {
    background: red;
    color: black;
}

/* Menü */
.menu {
    display: none;
    margin-top: 40px;
}

.menu a {
    display: block;
    margin: 15px auto;
    width: 250px;
    padding: 15px;
    border: 2px solid red;
    color: red;
    text-decoration: none;
    transition: 0.3s;
}

.menu a:hover {
    background: red;
    color: black;
}

/* Footer */
.footer {
    margin-top: 60px;
}
</style>

</head>

<body>

<canvas id="matrix"></canvas>

<div class="title">ALLXPOLON</div>
<div class="subtitle">ZİRVE</div>

<div class="btn" onclick="giris()">SİTEYE GİRİŞ</div>

<div class="menu" id="menu">
    <a href="https://instagram.com/allxpolon_ebediafk" target="_blank">INSTAGRAM</a>
    <a href="https://wa.me/254775785714" target="_blank">WHATSAPP</a>
</div>

<div class="footer">لا غالب إلا الله</div>

<!-- Müzik -->
<audio autoplay loop>
    <source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3" type="audio/mpeg">
</audio>

<script>
// Giriş
function giris() {
    document.querySelector(".btn").style.display = "none";
    document.getElementById("menu").style.display = "block";
}

// Matrix efekti
let canvas = document.getElementById("matrix");
let ctx = canvas.getContext("2d");

canvas.height = window.innerHeight;
canvas.width = window.innerWidth;

let letters = "01";
letters = letters.split("");

let fontSize = 14;
let columns = canvas.width / fontSize;

let drops = [];
for (let x = 0; x < columns; x++)
    drops[x] = 1;

function draw() {
    ctx.fillStyle = "rgba(0, 0, 0, 0.05)";
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    ctx.fillStyle = "red";
    ctx.font = fontSize + "px monospace";

    for (let i = 0; i < drops.length; i++) {
        let text = letters[Math.floor(Math.random()*letters.length)];
        ctx.fillText(text, i*fontSize, drops[i]*fontSize);

        if (drops[i]*fontSize > canvas.height && Math.random() > 0.975)
            drops[i] = 0;

        drops[i]++;
    }
}

setInterval(draw, 33);
</script>

</body>
</html>
