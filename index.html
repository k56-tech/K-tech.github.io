<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ALLXPOLON</title>

<style>
body {
    margin: 0;
    padding: 0;
    background: black;
    font-family: Arial, sans-serif;
    color: red;
    text-align: center;
}

/* Başlık */
.title {
    font-size: 60px;
    margin-top: 80px;
    letter-spacing: 10px;
    color: red;
    text-shadow: 0 0 20px red, 0 0 40px red;
}

/* Alt başlık */
.subtitle {
    margin-top: 10px;
    font-size: 18px;
    letter-spacing: 5px;
    color: red;
}

/* Buton kutusu */
.box {
    margin: 50px auto;
    width: 300px;
    border: 2px solid red;
    padding: 20px;
    box-shadow: 0 0 15px red;
}

/* Linkler */
.link {
    padding: 15px;
    border-bottom: 1px dashed red;
    cursor: pointer;
}

.link:last-child {
    border-bottom: none;
}

.link:hover {
    background: rgba(255,0,0,0.1);
}

/* Giriş butonu */
.enter-btn {
    margin-top: 50px;
    display: inline-block;
    padding: 15px 40px;
    border: 2px solid red;
    color: red;
    text-decoration: none;
    font-size: 18px;
    box-shadow: 0 0 10px red;
    transition: 0.3s;
}

.enter-btn:hover {
    background: red;
    color: black;
}

/* Alt yazı */
.footer {
    margin-top: 80px;
    font-size: 20px;
    color: red;
}
</style>

</head>
<body>

<div class="title">ALLXPOLON</div>
<div class="subtitle">ZİRVE</div>

<div class="box">
    <div class="link">TELEGRAM</div>
    <div class="link">INSTAGRAM</div>
    <div class="link">WHATSAPP</div>
</div>

<a href="#" class="enter-btn">SİTEYE GİRİŞ</a>

<div class="footer">لا غالب إلا الله</div>

</body>
</html>
