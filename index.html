<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<title>Elmira'nın Doğum Günü</title>

<style>
body{
    margin:0;
    font-family:Arial, sans-serif;
    background:linear-gradient(#1a2a6c,#16222a);
    color:white;
    text-align:center;
    overflow:hidden;
}

h1{
    margin-top:40px;
}

.envelope{
    margin:40px auto;
    width:140px;
    height:90px;
    background:white;
    color:black;
    display:flex;
    align-items:center;
    justify-content:center;
    border-radius:10px;
    cursor:pointer;
    font-weight:bold;
}

.message{
    display:none;
    background:white;
    color:black;
    width:320px;
    margin:20px auto;
    padding:20px;
    border-radius:12px;
    font-size:18px;
}

.cake{
    font-size:90px;
    margin-top:20px;
}

.candles{
    font-size:35px;
    display:none;
}

.heart,.flower{
    position:absolute;
    animation:float 6s linear infinite;
}

@keyframes float{
    0%{transform:translateY(100vh);opacity:1;}
    100%{transform:translateY(-10vh);opacity:0;}
}

.firework{
    position:absolute;
    font-size:30px;
    animation:boom 2s infinite;
}

@keyframes boom{
    0%{transform:scale(0);}
    50%{transform:scale(1.6);}
    100%{transform:scale(0);}
}
</style>
</head>

<body>

<h1>🎉 Elmira'nın Doğum Günü 🎉</h1>

<div class="envelope" onclick="openLetter()">✉ Mektubu Aç</div>

<div class="message" id="msg">
Elmira, doğum günün kutlu olsun! 🎉<br><br>
Umarım yeni yaşın güzel geçer ve bolca güzel anı biriktirirsin.
</div>

<div class="cake">🎂</div>
<div class="candles" id="candles">🕯️🕯️🕯️</div>

<script>

function openLetter(){
    document.getElementById("msg").style.display="block";
    document.getElementById("candles").style.display="block";
    createFireworks();
}

function createHearts(){
    let heart=document.createElement("div");
    heart.className="heart";
    heart.innerHTML="❤️";
    heart.style.left=Math.random()*100+"vw";
    heart.style.fontSize=(20+Math.random()*20)+"px";
    document.body.appendChild(heart);
    setTimeout(()=>heart.remove(),6000);
}

function createFlowers(){
    let flower=document.createElement("div");
    flower.className="flower";
    flower.innerHTML="🌸";
    flower.style.left=Math.random()*100+"vw";
    flower.style.fontSize=(20+Math.random()*20)+"px";
    document.body.appendChild(flower);
    setTimeout(()=>flower.remove(),6000);
}

function createFireworks(){
    setInterval(()=>{
        let fw=document.createElement("div");
        fw.className="firework";
        fw.innerHTML="🎆";
        fw.style.left=Math.random()*100+"vw";
        fw.style.top=Math.random()*60+"vh";
        document.body.appendChild(fw);
        setTimeout(()=>fw.remove(),2000);
    },800);
}

setInterval(createHearts,800);
setInterval(createFlowers,1200);

</script>

</body>
</html>
