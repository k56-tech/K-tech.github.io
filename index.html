<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Elmira'nın Doğum Günü</title>

<style>
body{
margin:0;
font-family:Arial, sans-serif;
background:linear-gradient(#0f2027,#203a43,#2c5364);
color:white;
text-align:center;
overflow-x:hidden;
}

/* Parlayan başlık */
h1{
margin-top:30px;
animation:glow 2s infinite alternate;
}
@keyframes glow{
from{ text-shadow:0 0 10px pink;}
to{ text-shadow:0 0 30px yellow;}
}

/* Mektup */
.envelope{
margin:30px auto;
width:150px;
height:90px;
background:white;
color:black;
display:flex;
align-items:center;
justify-content:center;
border-radius:10px;
cursor:pointer;
font-weight:bold;
}

/* Mesaj */
.message{
display:none;
background:white;
color:black;
width:320px;
margin:20px auto;
padding:20px;
border-radius:12px;
font-size:18px;
}

/* Pasta */
.cake{
font-size:90px;
cursor:pointer;
}

.candles{
font-size:35px;
}

/* Kalp ve çiçek animasyonu */
.heart,.flower,.balloon{
position:absolute;
animation:float 6s linear infinite;
}

@keyframes float{
0%{transform:translateY(100vh);opacity:1;}
100%{transform:translateY(-10vh);opacity:0;}
}

/* Havai fişek */
.firework{
position:absolute;
font-size:40px;
animation:boom 2s infinite;
}

@keyframes boom{
0%{transform:scale(0);}
50%{transform:scale(1.8);}
100%{transform:scale(0);}
}

/* Yıldız */
.star{
position:absolute;
color:white;
animation:twinkle 3s infinite;
}

@keyframes twinkle{
0%{opacity:0.2;}
50%{opacity:1;}
100%{opacity:0.2;}
}

/* Mini oyun */
#game{
margin-top:30px;
display:none;
}

.target{
font-size:40px;
cursor:pointer;
position:absolute;
}

</style>
</head>

<body>

<audio autoplay loop>
<source src="music.mp3" type="audio/mpeg">
</audio>

<h1>🎉 Elmira'nın Doğum Günü 🎉</h1>

<div class="envelope" onclick="openLetter()">✉ Mektubu Aç</div>

<div class="message" id="msg">
Elmira, doğum günün kutlu olsun! 🎉<br><br>
Umarım yeni yaşın güzel geçer ve bolca güzel anı biriktirirsin.
</div>

<div class="cake" onclick="blowCandles()">🎂</div>
<div class="candles" id="candles">🕯️🕯️🕯️</div>

<br>

<div onclick="surprise()" style="font-size:60px;cursor:pointer;">🎁</div>

<div id="game">
<h2>Elmira'yı Yakala Oyunu</h2>
<p>Skor: <span id="score">0</span></p>
</div>

<script>

let score=0;

/* Mektup açma */
function openLetter(){
document.getElementById("msg").style.display="block";
document.getElementById("game").style.display="block";
createFireworks();
spawnTarget();
}

/* Mum üfleme */
function blowCandles(){
document.getElementById("candles").innerHTML="💨";
}

/* Hediye sürprizi */
function surprise(){
alert("Sürpriz! Yeni yaşın harika geçsin Elmira 🎉");
}

/* Kalpler */
function createHearts(){
let el=document.createElement("div");
el.className="heart";
el.innerHTML="❤️";
el.style.left=Math.random()*100+"vw";
el.style.fontSize=(20+Math.random()*20)+"px";
document.body.appendChild(el);
setTimeout(()=>el.remove(),6000);
}

/* Çiçekler */
function createFlowers(){
let el=document.createElement("div");
el.className="flower";
el.innerHTML="🌸";
el.style.left=Math.random()*100+"vw";
el.style.fontSize=(20+Math.random()*20)+"px";
document.body.appendChild(el);
setTimeout(()=>el.remove(),6000);
}

/* Balon */
function createBalloon(){
let el=document.createElement("div");
el.className="balloon";
el.innerHTML="🎈";
el.style.left=Math.random()*100+"vw";
el.style.fontSize="40px";
document.body.appendChild(el);
setTimeout(()=>el.remove(),6000);
}

/* Yıldız */
function createStar(){
let el=document.createElement("div");
el.className="star";
el.innerHTML="⭐";
el.style.left=Math.random()*100+"vw";
el.style.top=Math.random()*100+"vh";
document.body.appendChild(el);
}

for(let i=0;i<40;i++){
createStar();
}

/* Havai fişek */
function createFireworks(){
setInterval(()=>{
let fw=document.createElement("div");
fw.className="firework";
fw.innerHTML="🎆";
fw.style.left=Math.random()*100+"vw";
fw.style.top=Math.random()*60+"vh";
document.body.appendChild(fw);
setTimeout(()=>fw.remove(),2000);
},700);
}

/* Mini oyun */
function spawnTarget(){
let target=document.createElement("div");
target.className="target";
target.innerHTML="✨Elmira✨";

target.style.left=Math.random()*80+"vw";
target.style.top=Math.random()*80+"vh";

target.onclick=function(){
score++;
document.getElementById("score").innerText=score;
target.remove();
spawnTarget();
};

document.body.appendChild(target);
}

/* Sürekli animasyonlar */
setInterval(createHearts,800);
setInterval(createFlowers,1200);
setInterval(createBalloon,2000);

</script>

</body>
</html>
