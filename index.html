<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Elmira'nın Doğum Günü</title>

<style>

body{
margin:0;
font-family:Arial;
background:linear-gradient(#0f2027,#203a43,#2c5364);
color:white;
text-align:center;
overflow-x:hidden;
}

/* Başlık */
h1{
margin-top:30px;
animation:glow 2s infinite alternate;
}

@keyframes glow{
from{ text-shadow:0 0 10px yellow;}
to{ text-shadow:0 0 35px gold;}
}

/* Mektup */

.envelope{
margin:30px auto;
width:170px;
height:90px;
background:white;
color:black;
display:flex;
align-items:center;
justify-content:center;
border-radius:12px;
cursor:pointer;
font-weight:bold;
font-size:18px;
z-index:10;
position:relative;
}

/* Mesaj */

.message{
display:none;
background:white;
color:black;
width:320px;
margin:20px auto;
padding:20px;
border-radius:14px;
font-size:18px;
position:relative;
z-index:10;
}

/* Pasta */

.cake{
font-size:90px;
cursor:pointer;
z-index:10;
position:relative;
}

.candles{
font-size:35px;
}

/* yıldız */

.star{
position:absolute;
color:white;
opacity:0.3;
animation:twinkle 4s infinite;
z-index:0;
}

@keyframes twinkle{
0%{opacity:0.1;}
50%{opacity:0.6;}
100%{opacity:0.1;}
}

/* balon */

.balloon{
position:absolute;
animation:float 7s linear infinite;
font-size:40px;
z-index:1;
}

@keyframes float{
0%{transform:translateY(100vh);}
100%{transform:translateY(-10vh);}
}

/* havai fişek */

.firework{
position:absolute;
font-size:40px;
animation:boom 2s infinite;
z-index:1;
}

@keyframes boom{
0%{transform:scale(0);}
50%{transform:scale(2);}
100%{transform:scale(0);}
}

/* konfeti */

.confetti{
position:absolute;
font-size:20px;
animation:conf 5s linear infinite;
}

@keyframes conf{
0%{transform:translateY(-10vh) rotate(0deg);}
100%{transform:translateY(100vh) rotate(360deg);}
}

/* uçan elmira */

.flyElmira{
position:absolute;
font-size:20px;
color:yellow;
animation:fly 10s linear infinite;
}

@keyframes fly{
0%{transform:translateX(-10vw);}
100%{transform:translateX(110vw);}
}

/* oyun */

#game{
display:none;
margin-top:20px;
}

#startBtn{
padding:10px 20px;
font-size:18px;
border:none;
border-radius:8px;
cursor:pointer;
}

.target{
position:absolute;
font-size:35px;
cursor:pointer;
}

</style>
</head>

<body>

<h1>🎉 Elmira'nın Doğum Günü 🎉</h1>

<div class="envelope" onclick="openLetter()">✉️ Mektubu Aç</div>

<div class="message" id="msg">
Elmira, doğum günün kutlu olsun! 🎉<br><br>
Umarım yeni yaşın güzel geçer ve bolca güzel anı biriktirirsin.
</div>

<div class="cake" onclick="cakeClick()">🎂</div>
<div class="candles" id="candles">🕯️🕯️🕯️</div>

<br>

<div onclick="openGift()" style="font-size:60px;cursor:pointer;">🎁</div>

<div id="game">
<h2>Elmira'yı Yakala Oyunu</h2>
<button id="startBtn" onclick="startGame()">Oyunu Başlat</button>
<p>Skor: <span id="score">0</span></p>
<p>Rekor: <span id="highscore">0</span></p>
</div>

<script>

let score=0
let highscore=localStorage.getItem("elmiraScore") || 0
document.getElementById("highscore").innerText=highscore

/* mektup */

function openLetter(){
document.getElementById("msg").style.display="block"
document.getElementById("game").style.display="block"

navigator.vibrate?.(200)

createFireworks()
createConfetti()
}

/* pasta */

function cakeClick(){
alert("Bir dilek tut Elmira 🎂")
document.getElementById("candles").innerHTML="💨"
}

/* hediye */

function openGift(){

for(let i=0;i<10;i++){

let h=document.createElement("div")
h.innerHTML="❤️"
h.style.position="absolute"
h.style.left=Math.random()*100+"vw"
h.style.top=Math.random()*100+"vh"
document.body.appendChild(h)

setTimeout(()=>h.remove(),2000)

}

}

/* yıldız */

for(let i=0;i<40;i++){

let s=document.createElement("div")
s.className="star"
s.innerHTML="⭐"
s.style.left=Math.random()*100+"vw"
s.style.top=Math.random()*100+"vh"

document.body.appendChild(s)

}

/* balon */

setInterval(()=>{

let b=document.createElement("div")
b.className="balloon"
b.innerHTML="🎈"
b.style.left=Math.random()*100+"vw"

document.body.appendChild(b)

setTimeout(()=>b.remove(),7000)

},2000)

/* havai fişek */

function createFireworks(){

setInterval(()=>{

let f=document.createElement("div")
f.className="firework"
f.innerHTML="🎆"

f.style.left=Math.random()*100+"vw"
f.style.top=Math.random()*60+"vh"

document.body.appendChild(f)

setTimeout(()=>f.remove(),2000)

},800)

}

/* konfeti */

function createConfetti(){

setInterval(()=>{

let c=document.createElement("div")
c.className="confetti"
c.innerHTML="🎊"

c.style.left=Math.random()*100+"vw"

document.body.appendChild(c)

setTimeout(()=>c.remove(),5000)

},300)

}

/* uçan elmira */

setInterval(()=>{

let e=document.createElement("div")
e.className="flyElmira"
e.innerHTML="✨ Elmira ✨"

e.style.top=Math.random()*80+"vh"

document.body.appendChild(e)

setTimeout(()=>e.remove(),10000)

},4000)

/* oyun */

function startGame(){

spawnTarget()

}

function spawnTarget(){

let t=document.createElement("div")

t.className="target"
t.innerHTML="✨Elmira✨"

t.style.left=Math.random()*80+"vw"
t.style.top=Math.random()*80+"vh"

t.onclick=function(){

score++

document.getElementById("score").innerText=score

if(score>highscore){

highscore=score
localStorage.setItem("elmiraScore",score)
document.getElementById("highscore").innerText=score

}

t.remove()
spawnTarget()

}

document.body.appendChild(t)

}

</script>

</body>
</html>
